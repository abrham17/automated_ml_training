<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Price Prediction</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 40px; }
        .card { max-width: 560px; margin: auto; padding: 24px; border: 1px solid #e5e7eb; border-radius: 12px; }
        h1 { margin-top: 0; font-size: 24px; }
        label { display: block; margin-top: 12px; font-weight: 600; }
        input { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #d1d5db; border-radius: 8px; }
        button { margin-top: 16px; padding: 10px 16px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:disabled { background: #93c5fd; }
        .result { margin-top: 18px; font-weight: 700; }
        .error { margin-top: 12px; color: #b91c1c; }
        .hint { color: #6b7280; font-size: 12px; }
    </style>
    <script>
        async function submitPrediction(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            result.textContent = '';
            error.textContent = '';
            btn.disabled = true;
            const payload = {
                size: parseFloat(document.getElementById('size').value),
                bedrooms: parseInt(document.getElementById('bedrooms').value),
                bathrooms: parseInt(document.getElementById('bathrooms').value),
                age: parseFloat(document.getElementById('age').value)
            };
            try {
                const resp = await fetch('/api/predict/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) {
                    const text = await resp.text();
                    throw new Error(text || 'Request failed');
                }
                const data = await resp.json();
                result.textContent = `Predicted price: $${Math.round(data.predicted_price).toLocaleString()}`;
            } catch (e) {
                error.textContent = e.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
    </head>
<body>
    <div class="card">
        <h1>Price Prediction</h1>
        <p class="hint">Enter features to get an estimated price. The model retrains daily.</p>
        <form onsubmit="submitPrediction(event)">
            <label for="size">Size (m²)</label>
            <input id="size" name="size" type="number" step="0.01" value="100" required />

            <label for="bedrooms">Bedrooms</label>
            <input id="bedrooms" name="bedrooms" type="number" step="1" value="3" required />

            <label for="bathrooms">Bathrooms</label>
            <input id="bathrooms" name="bathrooms" type="number" step="1" value="2" required />

            <label for="age">Age (years)</label>
            <input id="age" name="age" type="number" step="0.1" value="10" required />

            <button id="submitBtn" type="submit">Predict</button>
        </form>
        <div id="result" class="result"></div>
        <div id="error" class="error"></div>
    </div>
</body>
</html>
